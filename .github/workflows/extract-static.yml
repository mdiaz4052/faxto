name: Extract static site

on:
  push:
    branches:
      - static-site-refactor
    paths:
      - scripts/extract_static.py
      - .github/workflows/extract-static.yml

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: static-site-refactor

      - name: Extract bundled assets and rebuild site
        run: python scripts/extract_static.py

      - name: Commit generated static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css script.js assets .nojekyll
          git commit -m "Refactor bundled page into static site" || exit 0
          git push origin HEAD:static-site-refactor
